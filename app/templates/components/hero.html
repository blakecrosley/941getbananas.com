<section class="hero">
    <div class="container">
        <div class="row align-items-center justify-content-center">
            <div class="col-lg-6 text-center text-lg-start">
                <h1><span class="hand-underline">Get Bananas</span></h1>
                <p class="lead">
                    The hand-drawn shopping list for your whole family.
                    On the App Store for iPhone, iPad, and Apple Watch.
                    Your groceries. Your way.
                </p>
                {% with anchor_id = "notify" %}{% include "components/_interest_form.html" %}{% endwith %}
            </div>
            <div class="col-lg-4 text-center mt-5 mt-lg-0">
                <div class="hero-mascot">
                    <img
                        src="{{ url_for('static', path='images/app-icon.png') }}"
                        alt="Get Bananas app icon"
                        class="mascot-image"
                    >
                </div>
            </div>
        </div>
    </div>
</section>
